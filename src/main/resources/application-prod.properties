# PROD: configure via variáveis de ambiente
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# Nunca habilitar console H2 em PROD
spring.h2.console.enabled=false

# JWT secret é obrigatório em PROD (sem fallback)
app.jwt.secret=${JWT_SECRET}

# CORS: seja específico (ex.: https://seu-frontend.com)
# app.cors.allowed-origins=https://seu-frontend.com
