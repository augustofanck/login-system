# DEV: H2 in-memory
spring.datasource.url=jdbc:h2:mem:loginsystem;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Flyway + JPA
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate

# H2 console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT secret (dev only fallback)
# Em DEV, se JWT_SECRET não estiver definido, cai num valor padrão "ok para teste".
# Em PROD, não existe fallback (ver application-prod.properties).
app.jwt.secret=${JWT_SECRET:dev-secret-change-me-please-32-chars-minimum}

# Log SQL se quiser debugar
# spring.jpa.show-sql=true
